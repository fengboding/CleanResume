<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanResume</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: [
              "Inter",
              "-apple-system",
              "BlinkMacSystemFont",
              "Segoe UI",
              "Roboto",
              "Helvetica Neue",
              "Noto Sans SC",
              "sans-serif",
            ],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: 0 0% 100%;
      --fg: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-fg: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-fg: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --muted: 240 4.8% 95.9%;
      --muted-fg: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-fg: 240 5.9% 10%;
      --border: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --accent-color: #6366f1;
    }

    .dark {
      --bg: 240 10% 3.9%;
      --fg: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-fg: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-fg: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --muted: 240 3.7% 15.9%;
      --muted-fg: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-fg: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
      --accent-color: #2dd4bf;
    }

    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: hsl(var(--muted)) transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(var(--muted));
      border-radius: 4px;
    }

    body {
      background: hsl(var(--bg));
      color: hsl(var(--fg));
      font-family:
        "Inter",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        "Noto Sans SC",
        sans-serif;
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }

    .fieldset-outline {
      border: 1px solid hsl(var(--border));
      border-radius: 0.5rem;
      padding: 10px 10px;
      position: relative;
      background: transparent;
    }

    .fieldset-outline legend {
      font-size: 0.6875rem;
      padding: 0 4px;
      color: hsl(var(--muted-fg));
      position: absolute;
      top: -0.5em;
      left: 8px;
      background: hsl(var(--card));
    }

    .fieldset-outline input,
    .fieldset-outline textarea,
    .fieldset-outline .tags-display {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-size: 0.8125rem;
      color: hsl(var(--fg));
      resize: none;
    }

    .fieldset-outline input::placeholder,
    .fieldset-outline textarea::placeholder {
      color: hsl(var(--muted-fg));
      opacity: 0;
    }

    .fieldset-outline:focus-within {
      border-color: var(--accent-color);
    }

    .fieldset-outline:focus-within input::placeholder,
    .fieldset-outline:focus-within textarea::placeholder {
      opacity: 1;
    }

    .fieldset-outline textarea {
      min-height: 60px;
      line-height: 1.5;
    }

    .panel-slide {
      position: fixed;
      top: 56px;
      bottom: 44px;
      left: 0;
      width: 420px;
      max-width: 100vw;
      transform: translateX(-100%);
      opacity: 0;
      transition:
        transform 0.3s ease,
        opacity 0.3s ease;
      z-index: 40;
      background: hsl(var(--card));
      border-right: 1px solid hsl(var(--border));
      display: flex;
      flex-direction: column;
    }

    .panel-slide.open {
      transform: translateX(0);
      opacity: 1;
    }

    @media (max-width: 640px) {
      .panel-slide {
        width: 100vw;
      }
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid hsl(var(--border));
      flex-shrink: 0;
      min-height: 44px;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .panel-footer {
      display: flex;
      justify-content: space-evenly;
      padding: 0.5rem 0.75rem;
      border-top: 1px solid hsl(var(--border));
      flex-shrink: 0;
      gap: 0.375rem;
    }

    .btn-round {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition:
        transform 0.15s,
        box-shadow 0.15s;
      padding: 8px;
    }

    .btn-round:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-round:active {
      transform: scale(0.97);
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      color: hsl(var(--fg));
      padding: 4px;
      border-radius: 6px;
      transition:
        background 0.15s,
        color 0.15s;
    }

    .btn-icon:hover {
      background: hsl(var(--accent));
    }

    .btn-icon.btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .btn-icon.btn-accent:hover {
      background: hsl(var(--accent));
      color: var(--accent-color);
    }

    .entry-card {
      border: 1px dashed hsl(var(--border));
      border-radius: 8px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .entry-card:hover {
      border-color: var(--accent-color);
    }

    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 8px 8px 0 0;
      transition: background 0.15s;
    }

    .entry-header:hover {
      background: hsl(var(--accent));
    }

    .section-box {
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition:
        box-shadow 0.15s,
        opacity 0.15s;
    }

    .section-box:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .section-box.dragging {
      opacity: 0.4;
    }

    .section-box.drag-over-top {
      border-top: 2px solid var(--accent-color);
    }

    .section-box.drag-over-bottom {
      border-bottom: 2px solid var(--accent-color);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s;
      user-select: none;
      cursor: grab;
    }

    .section-header:hover {
      background: hsl(var(--accent));
    }

    .section-header:active {
      cursor: grabbing;
    }

    .section-body {
      padding: 4px 8px 8px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 1px 8px;
      border-radius: 9999px;
      border: 1px solid hsl(var(--border));
      font-size: 0.75rem;
      white-space: nowrap;
      transition:
        border-color 0.15s,
        opacity 0.15s;
    }

    .tag-chip:hover {
      border-color: var(--accent-color);
    }

    .tag-chip.dragging {
      opacity: 0.4;
    }

    .tag-chip.drag-over {
      border-color: var(--accent-color);
      border-style: solid;
    }

    .tag-chip button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      line-height: 1;
      padding: 0 2px;
      color: hsl(var(--muted-fg));
    }

    .tag-chip button:hover {
      color: #ef4444;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: hsl(var(--card));
      border-width: 1px;
      border-color: hsl(var(--border));
      border-radius: 12px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal-box {
      transform: scale(1);
    }

    .notif-container {
      position: fixed;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 90%;
      max-width: 420px;
      pointer-events: none;
    }

    .notif {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      font-size: 0.8125rem;
      pointer-events: auto;
      animation: notifIn 0.3s ease forwards;
    }

    .notif.out {
      animation: notifOut 0.3s ease forwards;
    }

    @keyframes notifIn {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes notifOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-12px);
      }
    }

    .drop-overlay {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .drop-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .preview-paper {
      width: 794px;
      min-height: 1123px;
      background: #fff;
      color: #1a1a1a;
      position: relative;
      font-family:
        "Inter",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        sans-serif;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition:
        transform 0.15s,
        border-color 0.15s;
      flex-shrink: 0;
    }

    .color-dot:hover {
      transform: scale(1.15);
    }

    .color-dot.active {
      border-color: hsl(var(--fg));
      transform: scale(1.15);
    }

    .setting-group {
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .setting-group legend {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0 6px;
      color: hsl(var(--muted-fg));
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .slider-row label {
      font-size: 0.75rem;
      color: hsl(var(--muted-fg));
      min-width: 60px;
      flex-shrink: 0;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent-color);
      height: 4px;
    }

    .slider-row .slider-val {
      font-size: 0.6875rem;
      color: hsl(var(--muted-fg));
      min-width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      background: hsl(var(--muted));
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle-switch.on {
      background: var(--accent-color);
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch.on::after {
      transform: translateX(16px);
    }

    .setting-text-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid hsl(var(--border));
      background: transparent;
      font-size: 0.75rem;
      padding: 4px 0;
      outline: none;
      color: hsl(var(--fg));
      transition: border-color 0.15s;
    }

    .setting-text-input:focus {
      border-bottom-color: var(--accent-color);
    }

    @keyframes emptySwitch {

      0%,
      45% {
        opacity: 1;
      }

      50%,
      95% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes emptySwitch2 {

      0%,
      45% {
        opacity: 0;
      }

      50%,
      95% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    .empty-tip-1 {
      animation: emptySwitch 5s ease-in-out infinite;
    }

    .empty-tip-2 {
      animation: emptySwitch2 5s ease-in-out infinite;
    }

    @keyframes ping {

      75%,
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    .ping-dot {
      animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .spin-icon {
      animation: spin 1s linear infinite;
    }

    .template-card {
      border: 2px solid hsl(var(--border));
      border-radius: 4px;
      padding: 3px 4px;
      cursor: pointer;
      transition:
        border-color 0.15s,
        transform 0.15s;
      background: #fff;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }

    .template-card:hover {
      transform: scale(1.03);
    }

    .template-card.active {
      border-color: var(--accent-color);
    }

    .template-card-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .editor-footer-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      border-radius: 9999px;
      border: 1px solid hsl(var(--border));
      cursor: pointer;
      transition:
        transform 0.15s,
        box-shadow 0.15s,
        color 0.15s,
        border-color 0.15s;
      background: transparent;
      color: hsl(var(--fg));
      padding: 0.375rem 0.5rem;
      font-size: 0.625rem;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
    }

    .editor-footer-btn:hover {
      background: hsl(var(--accent));
      color: var(--accent-color);
      transform: scale(1.05);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .editor-footer-btn:active {
      transform: scale(0.97);
    }

    @media (min-width: 640px) {
      .editor-footer-btn {
        padding: 0.5rem 0.75rem;
        font-size: 0.6875rem;
        gap: 0.375rem;
      }
    }

    .float-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      cursor: pointer;
      transition:
        transform 0.15s,
        box-shadow 0.15s,
        border-color 0.15s;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }

    .float-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      background: hsl(var(--accent));
      color: var(--accent-color);
    }

    .float-btn:active {
      transform: scale(0.97);
    }

    .add-section-list {
      display: none;
      border-top: 1px solid hsl(var(--border));
      max-height: 260px;
      overflow-y: auto;
      background: hsl(var(--card));
      flex-shrink: 0;
    }

    .add-section-list.open {
      display: block;
    }

    .add-section-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.8125rem;
    }

    .add-section-item:hover {
      background: hsl(var(--accent));
      color: var(--accent-color);
    }

    .add-section-item.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .validation-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .validation-table th,
    .validation-table td {
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
      border-bottom: 1px solid hsl(var(--border));
    }

    .validation-table th {
      font-weight: 600;
      color: hsl(var(--muted-fg));
    }

    #preview-container {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #preview-container::-webkit-scrollbar {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      background: hsl(var(--bg) / 0.75);
      transition:
        opacity 0.5s ease,
        transform 0.5s ease;
    }

    .loading-overlay.dismissed {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .load-fade {
      animation: fadeUp 0.6s ease both;
    }

    .load-slide {
      animation: slideIn 0.4s ease both;
    }

    @keyframes bounceSoft {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(5px);
      }
    }

    .bounce-soft {
      animation: bounceSoft 1.8s ease-in-out infinite;
    }
  </style>
</head>

<body>
  <div id="loading-overlay" class="loading-overlay">
    <div class="text-center max-w-xs mx-auto px-6">
      <div class="load-fade" style="animation-delay: 0.1s">
        <div style="
              width: 56px;
              height: 56px;
              border-radius: 14px;
              background: var(--accent-color);
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto 16px;
            ">
          <i data-lucide="file-text" style="width: 28px; height: 28px; color: #fff"></i>
        </div>
      </div>
      <h1 class="text-xl font-bold load-fade" style="animation-delay: 0.2s" data-i18n="siteTitle">
        CleanResume
      </h1>
      <p class="text-sm mt-1 load-fade" style="color: hsl(var(--muted-fg)); animation-delay: 0.3s"
        id="loading-subtitle"></p>
      <div id="loading-features" class="my-6 text-left"></div>
      <div class="load-fade" style="animation-delay: 0.9s">
        <p class="text-xs" style="color: hsl(var(--muted-fg))" id="loading-dismiss"></p>
        <div style="margin-top: 6px; display: flex; justify-content: center">
          <i data-lucide="chevron-down" style="
                width: 14px;
                height: 14px;
                display: block;
                color: hsl(var(--muted-fg));
              " class="bounce-soft"></i>
        </div>
      </div>
    </div>
  </div>

  <header style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 50;
        background: hsl(var(--card));
        border-bottom: 1px solid hsl(var(--border));
      ">
    <div class="flex items-center gap-2">
      <i data-lucide="file-text" style="width: 22px; height: 22px; color: var(--accent-color)"></i><span
        class="font-semibold text-base" data-i18n="siteTitle">CleanResume</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="lang-btn" class="btn-icon btn-accent text-xs font-medium px-2 py-1"
        style="border-radius: 6px"></button><button id="theme-btn" class="btn-icon btn-accent p-1"
        style="border-radius: 6px"></button>
    </div>
  </header>

  <main id="app-body" style="
        position: fixed;
        top: 56px;
        bottom: 44px;
        left: 0;
        right: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        padding: 16px;
      ">
    <div id="editor-panel" class="panel-slide">
      <div class="panel-header">
        <div class="flex items-center gap-2">

        html += `<button class="btn-icon btn-accent p-1" draggable="false" data-action="toggle-visibility" data-sec="${sec.id}"><i data-lucide="${secVisible ? "eye" : "eye-off"}" style="width:13px;height:13px"></i></button>`;
        html += `<button class="btn-icon btn-danger p-1" draggable="false" data-action="remove-section" data-sec="${sec.id}"><i data-lucide="x" style="width:13px;height:13px"></i></button></div></div>`;
        if (!secCollapsed) {
          html += `<div class="section-body">`;
          (sec.entries || []).forEach((entry, ei) => {
            const kf = def.keyField;
            const kv = entry[kf] || entry.id.slice(-6);
            const entCollapsed=uiState.entryCollapsed[entry.id];
            html += `<div class="entry-card" data-entry-id="${entry.id}"><div class="entry-header"><div class="flex items-center gap-2">`;
            html += `<button class="btn-icon p-0.5" draggable="false" data-action="toggle-entry-collapse" data-sec="${sec.id}" data-entry="${entry.id}"><i data-lucide="${entCollapsed ? "chevron-right" : "chevron-down"}" style="width:11px;height:11px"></i></button>`;
            html += `<span class="text-xs" style="color:hsl(var(--muted-fg))" data-key-display="${entry.id}">${escHTML(kv)}</span></div><div class="flex items-center gap-1">`;
            if (ei > 0)
              html += `<button class="btn-icon btn-accent p-0.5" draggable="false" data-action="move-entry" data-sec="${sec.id}" data-entry="${entry.id}" data-dir="-1"><i data-lucide="arrow-up" style="width:12px;height:12px"></i></button>`;
            if (ei < sec.entries.length - 1)
              html += `<button class="btn-icon btn-accent p-0.5" draggable="false" data-action="move-entry" data-sec="${sec.id}" data-entry="${entry.id}" data-dir="1"><i data-lucide="arrow-down" style="width:12px;height:12px"></i></button>`;
            html += `<button class="btn-icon btn-danger p-0.5" draggable="false" data-action="remove-entry" data-sec="${sec.id}" data-entry="${entry.id}"><i data-lucide="trash-2" style="width:12px;height:12px"></i></button></div></div>`;
            if (!entCollapsed) {
              html += `<div class="p-2 space-y-2">`;
              (def.fields || []).forEach((f) => {
                if (f.type === "duration")
                  html += dfh(sec.id, entry.id, f.key, entry[f.key]);
                else if (f.type === "tags")
                  html += tfh(sec.id, entry.id, f.key, entry[f.key] || []);
                else html += fh("entry", f.key, f.type, sec.id, entry.id);
              });
              html += `</div>`;
            }
            html += `</div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
      body.innerHTML = html;
      const sl = document.getElementById("add-section-list");
      let slh = "";
      Object.keys(SECTION_DEFS).forEach((type) => {
        const added = resumeData.sections.some((s) => s.type === type);
        slh += `<div class="add-section-item${added ? " disabled" : ""}" data-action="add-section-type" data-type="${type}"><i data-lucide="${SECTION_DEFS[type].icon}" style="width:14px;height:14px"></i><span class="flex-1">${t(type)}</span>${added ? '<i data-lucide="check" style="width:14px;height:14px;color:var(--accent-color)"></i>' : ""}</div>`;
      });
      sl.innerHTML = slh;
      sl.classList.remove("open");
      document.getElementById("editor-footer").innerHTML =
        `<button class="editor-footer-btn" onclick="triggerImport()"><i data-lucide="file-output" style="width:12px;height:12px"></i><span>${t("import")}</span></button><button class="editor-footer-btn" onclick="exportData()"><i data-lucide="file-input" style="width:12px;height:12px"></i><span>${t("export")}</span></button><button class="editor-footer-btn" onclick="confirmLoadSample()"><i data-lucide="database-zap" style="width:12px;height:12px"></i><span>${t("load")}</span></button><button class="editor-footer-btn" onclick="toggleAddSectionList()"><i data-lucide="plus" style="width:12px;height:12px"></i><span>${t("addSection")}</span></button>`;
      lucide.createIcons();
      renderPreview();
    }

    function fh(prefix, key, type, secId, entryId) {
      const isP = prefix === "profile";
      const val = isP
        ? resumeData.profile[key] || ""
        : gef(secId, entryId, key);
      const ph = t("ph_" + key) || "";
      const label = t(key) || key;
      if (type === "textarea")
        return `<fieldset class="fieldset-outline"><legend>${label}</legend><textarea data-field="${key}" ${isP ? 'data-profile="1"' : `data-sec="${secId}" data-entry="${entryId}"`} placeholder="${ph}" rows="3">${escHTML(val)}</textarea></fieldset>`;
      return `<fieldset class="fieldset-outline"><legend>${label}</legend><input type="text" data-field="${key}" ${isP ? 'data-profile="1"' : `data-sec="${secId}" data-entry="${entryId}"`} placeholder="${ph}" value="${escAttr(val)}"></fieldset>`;
    }
    function dfh(secId, entryId, key, val) {
      const parts = (val || "").split(" - ");
      const from = parts[0] || "";
      const to = parts[1] || "";
      const label = t("duration") || "Duration";
      return `<fieldset class="fieldset-outline"><legend>${label}</legend><div class="flex items-center gap-1"><input type="text" data-field="${key}" data-part="from" data-sec="${secId}" data-entry="${entryId}" placeholder="${t("ph_durationFrom")}" value="${escAttr(from)}" class="flex-1" style="min-width:0"><span class="text-gray-400 text-xs flex-shrink-0">-</span><input type="text" data-field="${key}" data-part="to" data-sec="${secId}" data-entry="${entryId}" placeholder="${t("ph_durationTo")}" value="${escAttr(to)}" class="flex-1" style="min-width:0"></div></fieldset>`;
    }
    function tfh(secId, entryId, key, tags) {
      const label = t("tags") || "Tags";
      let chips = (tags || [])
        .map(
          (tag, i) =>
            `<span class="tag-chip" draggable="true" data-drag-tag="${secId}|${entryId}|${key}|${i}">${escHTML(tag)}<button draggable="false" data-action="remove-tag" data-sec="${secId}" data-entry="${entryId}" data-field="${key}" data-idx="${i}">&times;</button></span>`,
        )
        .join("");
      return `<fieldset class="fieldset-outline"><legend>${label}</legend><div class="flex flex-wrap gap-1 items-center tags-display">${chips}<input type="text" data-field="${key}" data-sec="${secId}" data-entry="${entryId}" data-tags-input="1" placeholder="${t("ph_tags")}" class="flex-1 min-w-[60px]" style="font-size:0.75rem"></div></fieldset>`;
    }
    function gef(secId, entryId, key) {
      const sec = resumeData.sections.find((s) => s.id === secId);
      if (!sec) return "";
      const entry = (sec.entries || []).find((e) => e.id === entryId);
      return entry ? entry[key] || "" : "";
    }

    function attachEditorEventsOnce() {
      if (editorListenersReady) return;
      editorListenersReady = true;
      const body = document.getElementById("editor-body");
      const sl = document.getElementById("add-section-list");
      sl.addEventListener("click", (e) => {
        const item = e.target.closest(
          '[data-action="add-section-type"]:not(.disabled)',
        );
        if (item) addSection(item.dataset.type);
      });
      body.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const a = btn.dataset.action;
        if (a === "toggle-collapse") toggleCollapse(btn.dataset.sec);
        else if (a === "toggle-entry-collapse")
          toggleEntryCollapse(btn.dataset.sec, btn.dataset.entry);
        else if (a === "add-entry") addEntry(btn.dataset.sec);
        else if (a === "toggle-visibility")
          toggleSectionVisibility(btn.dataset.sec);
        else if (a === "remove-section")
          confirmRemoveSection(btn.dataset.sec);
        else if (a === "remove-entry")
          confirmRemoveEntry(btn.dataset.sec, btn.dataset.entry);
        else if (a === "move-entry")
          moveEntry(
            btn.dataset.sec,
            btn.dataset.entry,
            parseInt(btn.dataset.dir),
          );
        else if (a === "remove-tag")
          removeTag(
            btn.dataset.sec,
            btn.dataset.entry,
            btn.dataset.field,
            parseInt(btn.dataset.idx),
          );
      });
      body.addEventListener("input", (e) => {
        const el = e.target;
        if (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA") return;
        const field = el.dataset.field;
        if (!field) return;
        if (el.dataset.profile) {
          resumeData.profile[field] = el.value;
        } else if (el.dataset.sec && el.dataset.entry) {
          const sec = resumeData.sections.find(
            (s) => s.id === el.dataset.sec,
          );
          const entry = sec?.entries?.find(
            (en) => en.id === el.dataset.entry,
          );
          if (entry) {
            if (el.dataset.part) {
              const other = el.dataset.part === "from" ? "to" : "from";
              const otherEl = body.querySelector(
                `input[data-field="${field}"][data-part="${other}"][data-entry="${el.dataset.entry}"]`,
              );
              const fv =
                el.dataset.part === "from" ? el.value : otherEl?.value || "";
              const tv =
                el.dataset.part === "to" ? el.value : otherEl?.value || "";
              entry[field] = fv || tv ? `${fv} - ${tv}` : "";
            } else if (!el.dataset.tagsInput) {
              const orgEntryId = entry.id;
              entry[field] = el.value;
              const def = SECTION_DEFS[sec.type];
              if (def && field === def.keyField) {
                const d = body.querySelector(
                  `[data-key-display="${el.dataset.entry}"]`,
                );
                if (d) d.textContent = el.value || el.dataset.entry.slice(-6);
              }
            }
          }
        }
        saveData();
        debouncePreview();
      });
      body.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.dataset.tagsInput) {
          e.preventDefault();
          const val = e.target.value.trim();
          if (!val) return;
          const sec = resumeData.sections.find(
            (s) => s.id === e.target.dataset.sec,
          );
          const entry = sec?.entries?.find(
            (en) => en.id === e.target.dataset.entry,
          );
          if (entry) {
            if (!entry[e.target.dataset.field])
              entry[e.target.dataset.field] = [];
            entry[e.target.dataset.field].push(val);
            e.target.value = "";
            saveData();
            renderEditor();
          }
        }
      });
      let dragType = null;
      body.addEventListener("dragstart", (e) => {
        if (e.target.closest("[data-action]")) return;
        const tagChip = e.target.closest("[data-drag-tag]");
        if (tagChip) {
          e.stopPropagation();
          dragType = "tag";
          e.dataTransfer.setData("text/tag", tagChip.dataset.dragTag);
          tagChip.classList.add("dragging");
          return;
        }
        const hdr = e.target.closest("[data-drag-section]");
        if (!hdr) return;
        dragType = "section";
        e.dataTransfer.setData("text/section", hdr.dataset.dragSection);
        hdr.closest(".section-box").classList.add("dragging");
      });
      body.addEventListener("dragend", (e) => {
        body
          .querySelectorAll(".section-box.dragging,.tag-chip.dragging")
          .forEach((el) => el.classList.remove("dragging"));
        body
          .querySelectorAll(
            ".drag-over-top,.drag-over-bottom,.tag-chip.drag-over",
          )
          .forEach((el) =>
            el.classList.remove(
              "drag-over-top",
              "drag-over-bottom",
              "drag-over",
            ),
          );
        dragType = null;
      });
      body.addEventListener("dragover", (e) => {
        if (dragType === "section") {
          const box = e.target.closest(".section-box[data-section-id]");
          if (!box) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          body
            .querySelectorAll(".drag-over-top,.drag-over-bottom")
            .forEach((el) =>
              el.classList.remove("drag-over-top", "drag-over-bottom"),
            );
          const r = box.getBoundingClientRect();
          box.classList.add(
            e.clientY < r.top + r.height / 2
              ? "drag-over-top"
              : "drag-over-bottom",
          );
        } else if (dragType === "tag") {
          const chip = e.target.closest("[data-drag-tag]");
          if (!chip) return;
          e.preventDefault();
          e.stopPropagation();
          e.dataTransfer.dropEffect = "move";
          body
            .querySelectorAll(".tag-chip.drag-over")
            .forEach((c) => c.classList.remove("drag-over"));
          chip.classList.add("drag-over");
        }
      });
      body.addEventListener("dragleave", (e) => {
        if (dragType === "section") {
          const box = e.target.closest(".section-box[data-section-id]");
          if (box) box.classList.remove("drag-over-top", "drag-over-bottom");
        } else if (dragType === "tag") {
          const chip = e.target.closest("[data-drag-tag]");
          if (chip) chip.classList.remove("drag-over");
        }
      });
      body.addEventListener("drop", (e) => {
        if (dragType === "section") {
          const box = e.target.closest(".section-box[data-section-id]");
          if (!box) return;
          e.preventDefault();
          e.stopPropagation();
          box.classList.remove("drag-over-top", "drag-over-bottom");
          const fromId = e.dataTransfer.getData("text/section");
          if (!fromId) return;
          const toId = box.dataset.sectionId;
          if (fromId === toId) return;
          const fi = resumeData.sections.findIndex((s) => s.id === fromId);
          const ti = resumeData.sections.findIndex((s) => s.id === toId);
          if (fi < 0 || ti < 0) return;
          const r = box.getBoundingClientRect();
          const insB = e.clientY < r.top + r.height / 2;
          const [item] = resumeData.sections.splice(fi, 1);
          let ni = resumeData.sections.findIndex((s) => s.id === toId);
          if (!insB) ni++;
          resumeData.sections.splice(ni, 0, item);
          saveData();
          renderEditor();
        } else if (dragType === "tag") {
          const chip = e.target.closest("[data-drag-tag]");
          if (!chip) return;
          e.preventDefault();
          e.stopPropagation();
          chip.classList.remove("drag-over");
          const fi = e.dataTransfer.getData("text/tag");
          if (!fi) return;
          const ti = chip.dataset.dragTag;
          const [fS, fE, fF, fI] = fi.split("|");
          const [tS, tE, tF, tI] = ti.split("|");
          if (fS !== tS || fE !== tE || fF !== tF) return;
          const sec = resumeData.sections.find((s) => s.id === fS);
          const entry = sec?.entries?.find((en) => en.id === fE);
          if (entry && entry[fF]) {
            const arr = entry[fF];
            const a = parseInt(fI),
              b = parseInt(tI);
            const [it] = arr.splice(a, 1);
            arr.splice(b, 0, it);
            saveData();
            renderEditor();
          }
        }
      });
      let touchType = null,
        touchInfo = null,
        touchGhost = null;
      body.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length !== 1) return;
          const tagChip = e.target.closest("[data-drag-tag]");
          if (tagChip && !e.target.closest("button")) {
            touchType = "tag";
            touchInfo = tagChip.dataset.dragTag;
            return;
          }
          const hdr = e.target.closest("[data-drag-section]");
          if (hdr && !e.target.closest("[data-action]")) {
            touchType = "section";
            touchInfo = hdr.dataset.dragSection;
          }
        },
        { passive: true },
      );
      body.addEventListener(
        "touchmove",
        (e) => {
          if (!touchType) return;
          e.preventDefault();
          const tch = e.touches[0];
          if (!touchGhost) {
            if (touchType === "tag") {
              const src = body.querySelector(
                `[data-drag-tag="${touchInfo}"]`,
              );
              if (src) src.classList.add("dragging");
              touchGhost = document.createElement("div");
              touchGhost.className = "touch-drag-ghost";
              touchGhost.style.fontSize = "0.75rem";
              touchGhost.style.padding = "4px 12px";
              if (src)
                touchGhost.textContent = src.textContent.replace("×", "");
              document.body.appendChild(touchGhost);
            } else if (touchType === "section") {
              const box = body.querySelector(
                `[data-section-id="${touchInfo}"]`,
              );
              if (!box) return;
              box.classList.add("dragging");
              const r = box.getBoundingClientRect();
              touchGhost = document.createElement("div");
              touchGhost.className = "touch-drag-ghost";
              touchGhost.style.width = r.width + "px";
              touchGhost.innerHTML =
                box.querySelector(".section-header").innerHTML;
              document.body.appendChild(touchGhost);
            }
          }
          touchGhost.style.left = tch.clientX - 60 + "px";
          touchGhost.style.top = tch.clientY - 20 + "px";
          if (touchType === "section") {
            body
              .querySelectorAll(".section-box[data-section-id]")
              .forEach((b) => {
                b.classList.remove("drag-over-top", "drag-over-bottom");
                const r = b.getBoundingClientRect();
                if (tch.clientY > r.top && tch.clientY < r.bottom)
                  b.classList.add(
                    tch.clientY < r.top + r.height / 2
                      ? "drag-over-top"
                      : "drag-over-bottom",
                  );
              });
          } else if (touchType === "tag") {
            body.querySelectorAll("[data-drag-tag]").forEach((c) => {
              c.classList.remove("drag-over");
              const r = c.getBoundingClientRect();
              if (
                tch.clientX > r.left &&
                tch.clientX < r.right &&
                tch.clientY > r.top &&
                tch.clientY < r.bottom &&
                c.dataset.dragTag !== touchInfo
              )
                c.classList.add("drag-over");
            });
          }
        },
        { passive: false },
      );
      body.addEventListener("touchend", (e) => {
        if (!touchType) return;
        if (touchGhost) {
          document.body.removeChild(touchGhost);
          touchGhost = null;
        }
        if (touchType === "section") {
          body
            .querySelectorAll(".section-box[data-section-id]")
            .forEach((b) => {
              b.classList.remove("dragging");
              if (
                b.classList.contains("drag-over-top") ||
                b.classList.contains("drag-over-bottom")
              ) {
                const toId = b.dataset.sectionId;
                const fi = resumeData.sections.findIndex(
                  (s) => s.id === touchInfo,
                );
                if (fi < 0) return;
                const r = b.getBoundingClientRect();
                const insB =
                  e.changedTouches[0]?.clientY < r.top + r.height / 2;
                const [item] = resumeData.sections.splice(fi, 1);
                let ni = resumeData.sections.findIndex((s) => s.id === toId);
                if (!insB) ni++;
                resumeData.sections.splice(ni, 0, item);
                saveData();
                renderEditor();
              }
              b.classList.remove("drag-over-top", "drag-over-bottom");
            });
        } else if (touchType === "tag") {
          body.querySelectorAll("[data-drag-tag]").forEach((c) => {
            c.classList.remove("dragging");
            if (c.classList.contains("drag-over")) {
              c.classList.remove("drag-over");
              const fi = touchInfo;
              const ti = c.dataset.dragTag;
              const [fS, fE, fF, fI] = fi.split("|");
              const [tS, tE, tF, tI] = ti.split("|");
              if (fS === tS && fE === tE && fF === tF) {
                const sec = resumeData.sections.find((s) => s.id === fS);
                const entry = sec?.entries?.find((en) => en.id === fE);
                if (entry && entry[fF]) {
                  const arr = entry[fF];
                  const a = parseInt(fI),
                    b = parseInt(tI);
                  const [it] = arr.splice(a, 1);
                  arr.splice(b, 0, it);
                  saveData();
                  renderEditor();
                }
              }
            }
          });
        }
        touchType = null;
        touchInfo = null;
      });
    }

    document.addEventListener("click", (e) => {
      if (!addListOpen) return;
      const sl = document.getElementById("add-section-list");
      const ef = document.getElementById("editor-footer");
      if (sl && ef && !sl.contains(e.target) && !ef.contains(e.target)) {
        addListOpen = false;
        sl.classList.remove("open");
      }
    });
    let previewTimer = null;
    function debouncePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(renderPreview, 200);
    }
    function toggleCollapse(secId) {
      uiState.sectionCollapsed[secId] = !uiState.sectionCollapsed[secId];
      saveUI();
      renderEditor();
    }
    function toggleEntryCollapse(secId, entryId) {
      uiState.entryCollapsed[entryId] = !uiState.entryCollapsed[entryId];
      saveUI();
      renderEditor();
    }
    function toggleSectionVisibility(secId) {
      uiState.sectionVisible[secId] = !uiState.sectionVisible[secId];
      saveUI();
      renderEditor();
    }
    function addEntry(secId) {
      const sec = resumeData.sections.find((s) => s.id === secId);
      if (sec) {
        if (!sec.entries) sec.entries = [];
        const entryId = genId();
        sec.entries.push({ id: entryId });
        uiState.entryCollapsed[entryId] = false;
        saveUI();
        saveData();
        renderEditor();
        notify(
          "success",
          t("notify_entryAdded").replace("{section}", t(sec.type)),
        );
      }
    }
    function moveEntry(secId, entryId, dir) {
      const sec = resumeData.sections.find((s) => s.id === secId);
      if (!sec) return;
      const idx = sec.entries.findIndex((e) => e.id === entryId);
      const ni = idx + dir;
      if (ni < 0 || ni >= sec.entries.length) return;
      [sec.entries[idx], sec.entries[ni]] = [
        sec.entries[ni],
        sec.entries[idx],
      ];
      saveData();
      renderEditor();
    }
    function removeTag(secId, entryId, field, idx) {
      const sec = resumeData.sections.find((s) => s.id === secId);
      const entry = sec?.entries?.find((e) => e.id === entryId);
      if (entry && entry[field]) {
        entry[field].splice(idx, 1);
        saveData();
        renderEditor();
      }
    }
    function addSection(type) {
      const existing = resumeData.sections.find((s) => s.type === type);
      if (existing) {
        notify("info", t(type) + " " + t("added"));
        return;
      }
      const secId = genId();
      const entryId = genId();
      resumeData.sections.push({
        id: secId,
        type,
        entries: [{ id: entryId }],
      });
      uiState.sectionCollapsed[secId] = false;
      uiState.sectionVisible[secId] = true;
      uiState.entryCollapsed[entryId] = false;
      saveUI();
      saveData();
      renderEditor();
      notify(
        "success",
        t("notify_sectionAdded").replace("{section}", t(type)),
      );
    }
    function confirmRemoveSection(secId) {
      const sec = resumeData.sections.find((s) => s.id === secId);
      if (!sec) return;
      showModal(
        t("modal_removeSectionTitle"),
        t("modal_removeSectionBody").replace("{section}", t(sec.type)),
        t("confirm"),
        () => {
          delete uiState.sectionCollapsed[secId];
          delete uiState.sectionVisible[secId];

    function validateImportData(json) {
      const results = [];
      if (json.profile) {
        const pf = [
          "fullName",
          "position",
          "email",
          "phone",
          "location",
          "website",
          "summary",
        ];
        const pres = Object.keys(json.profile).filter((k) => pf.includes(k));
        const miss = pf.filter((k) => !Object.keys(json.profile).includes(k));
        if (!json.profile.fullName)
          results.push({ section: t("profile"), key: "-", state: "ignored" });
        else
          results.push({
            section: t("profile"),
            key: json.profile.fullName,
            state: miss.length ? "partial" : "all",
          });
      }
      if (json.sections && Array.isArray(json.sections)) {
        json.sections.forEach((sec) => {
          const type = sec.type || "";
          const def = SECTION_DEFS[type];
          if (!def) {
            results.push({
              section: type || "Unknown",
              key: "-",
              state: "ignored",
            });
            return;
          }
          (sec.entries || []).forEach((entry) => {
            const kf = def.keyField;
            const kv = entry[kf];
            if (!kv) {
              results.push({ section: t(type), key: "-", state: "ignored" });
              return;
            }
            const af = def.fields.map((f) => f.key);
            const miss = af.filter(
              (k) =>
                entry[k] === undefined ||
                entry[k] === "" ||
                (Array.isArray(entry[k]) && entry[k].length === 0),
            );
            results.push({
              section: t(type),
              key: kv,
              state: miss.length ? "partial" : "all",
            });
          });
        });
      }
      return results;
    }
    function applyImportData(json) {
      if (json.profile && json.profile.fullName)
        resumeData.profile = { ...resumeData.profile, ...json.profile };
      if (json.sections && Array.isArray(json.sections)) {
        resumeData.sections = json.sections
          .map((sec) => {
            const def = SECTION_DEFS[sec.type];
            if (!def) return null;
            const entries = (sec.entries || [])
              .filter((entry) => entry[def.keyField])
              .map((entry) => ({ id: entry.id || genId(), ...entry }));
            return {
              id: sec.id || genId(),
              type: sec.type,
              entries,
            };
          })
          .filter(Boolean);
      }
    }

      let h = `<div style="margin-bottom:${entS}px">`;
      if (type === "education") {
        h += `<div style="display:grid;grid-template-columns:1fr auto;gap:0 ${fs}px"><div><div style="font-weight:600;font-size:${fs * 1.05}px">${escHTML(e.university || "")}</div><div style="font-size:${fs * 0.9}px;color:#6b7280">${[e.degree, e.fieldOfStudy].filter(Boolean).join(" · ")}</div></div><div style="text-align:right;font-size:${fs * 0.85}px;color:#6b7280"><div>${escHTML(e.location || "")}</div><div>${escHTML(e.duration || "")}</div></div></div>`;
        if (e.description)
          h += `<div style="margin-top:4px;font-size:${fs * 0.88}px;color:#4b5563">${fD(e.description, fs, lh)}</div>`;
      } else if (type === "experience") {
        h += `<div style="display:grid;grid-template-columns:1fr auto;gap:0 ${fs}px"><div><div style="font-weight:600;font-size:${fs * 1.05}px">${escHTML(e.company || "")}</div><div style="font-size:${fs * 0.9}px;color:#6b7280">${escHTML(e.position || "")}</div></div><div style="text-align:right;font-size:${fs * 0.85}px;color:#6b7280"><div>${escHTML(e.location || "")}</div><div>${escHTML(e.duration || "")}</div></div></div>`;
        if (e.description)
          h += `<div style="margin-top:4px;font-size:${fs * 0.88}px;color:#4b5563">${fD(e.description, fs, lh)}</div>`;
      } else if (type === "projects") {
        h += `<div style="display:grid;grid-template-columns:1fr auto;gap:0 ${fs}px"><div><div style="font-weight:600;font-size:${fs * 1.05}px">${escHTML(e.name || "")}</div><div style="font-size:${fs * 0.9}px;color:#6b7280">${[e.role, e.institution].filter(Boolean).join(" · ")}</div></div><div style="text-align:right;font-size:${fs * 0.85}px;color:#6b7280"><div>${escHTML(e.duration || "")}</div></div></div>`;
        if (e.tags && e.tags.length) {
          h += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
          e.tags.forEach((tg) => {
            h += `<span style="${tS}">${escHTML(tg)}</span>`;
          });
          h += `</div>`;
        }
        if (e.description)
          h += `<div style="margin-top:4px;font-size:${fs * 0.88}px;color:#4b5563">${fD(e.description, fs, lh)}</div>`;
      } else if (type === "awards") {
        h += `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:${fs}px"><div style="font-size:${fs * 0.95}px">${escHTML(e.title || "")}</div><div style="display:flex;gap:${fs * 0.5}px;font-size:${fs * 0.85}px;color:#6b7280;flex-shrink:0">${escHTML(e.issuer || "")}${e.date ? "<span>" + escHTML(e.date) + "</span>" : ""}</div></div>`;
      } else if (type === "certifications") {
        h += `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:${fs}px"><div style="font-size:${fs * 0.95}px">${escHTML(e.name || "")}</div><div style="display:flex;gap:${fs * 0.5}px;font-size:${fs * 0.85}px;color:#6b7280;flex-shrink:0">${escHTML(e.issuer || "")}${e.date ? "<span>" + escHTML(e.date) + "</span>" : ""}</div></div>`;
      } else if (type === "languages") {
        h += `<div style="display:flex;align-items:baseline;gap:6px"><span style="font-size:${fs * 0.95}px">${escHTML(e.language || "")}</span>`;
        if (e.fluency)
          h += `<span style="${tS}">${escHTML(e.fluency)}</span>`;
        h += `</div>`;
      } else if (type === "skills") {
        h += `<div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap"><span style="font-size:${fs * 0.95}px;flex-shrink:0">${escHTML(e.category || "")}</span>`;
        if (e.tags && e.tags.length) {
          h += `<div style="display:flex;flex-wrap:wrap;gap:3px">`;
          e.tags.forEach((tg) => {
            h += `<span style="${tS}">${escHTML(tg)}</span>`;
          });
          h += `</div>`;
        }
        h += `</div>`;
      }
      h += `</div>`;
      return h;
    }
    function fD(text, fs, lh) {
      if (!text) return "";
      const lines = text.split("\n");
      let inList = false,
        h = "";
      lines.forEach((line) => {
        const isB = /^[-•]\s/.test(line);
        if (isB) {
          if (!inList) {
            h += `<ul style="margin:0;padding-left:16px;list-style:disc">`;
            inList = true;
          }
          let c = line.replace(/^[-•]\s/, "");
          c = c.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
          h += `<li style="font-size:${fs * 0.88}px;line-height:${lh}">${c}</li>`;
        } else {
          if (inList) {
            h += `</ul>`;
            inList = false;
          }
          let c = line.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
          if (c.trim())
            h += `<div style="font-size:${fs * 0.88}px;line-height:${lh}">${c}</div>`;
        }
      });
      if (inList) h += `</ul>`;
      return h;
    }

    function updatePreviewScale() {
      const container = document.getElementById("preview-container");
      const paper = document.getElementById("preview-paper");
      const wrapper = document.getElementById("preview-wrapper");
      if (!container || !paper) return;
      const availW = container.clientWidth - 32;
      const scale = Math.min(1, availW / A4W);
      wrapper.style.transform = `scale(${scale})`;
      wrapper.style.transformOrigin = "top center";
      const paperH = paper.scrollHeight;
      const extraH = paperH * (1 - scale);
      const extraW = A4W * (1 - scale);
      wrapper.style.marginBottom = -extraH + "px";
      wrapper.style.marginLeft = -(extraW / 2) + "px";
      wrapper.style.marginRight = -(extraW / 2) + "px";
    }

    async function savePDF() {
      const btn = document.getElementById("float-save");
      btn.disabled = true;
      const sv = btn.querySelector("svg");
      if (sv) {
        const ni = document.createElement("i");
        ni.setAttribute("data-lucide", "loader-circle");
        ni.className = "spin-icon";
        ni.style.cssText =
          "width:18px;height:18px;position:relative;z-index:1";
        sv.replaceWith(ni);
        lucide.createIcons();
      }
      try {
        const paper = document.getElementById("preview-paper");
        const wrapper = document.getElementById("preview-wrapper");
        const container = document.getElementById("preview-container");
        const p = resumeData.profile;
        const name = p.fullName || "Resume";
        const pos = p.position ? " - " + p.position : "";
        const date = new Date().toISOString().slice(0, 10);
        const fn = `${name}${pos}_${date}.pdf`;
        const pad = settings.padding;
        const ch = paper.scrollHeight;
        const isSingle = settings.singlePage;
        const opt = {
          margin: isSingle ? 0 : [pad.top, 0, pad.bottom, 0],
          filename: fn,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            logging: false,
            width: A4W,
            onclone: function (doc) {
              const w = doc.getElementById("preview-wrapper");
              if (w) {
                w.style.transform = "none";
                w.style.height = "auto";
                w.style.marginBottom = "0";
                w.style.marginLeft = "0";
                w.style.marginRight = "0";
              }
              const pc = doc.getElementById("preview-container");
              if (pc) {
                pc.style.overflow = "visible";
                pc.style.height = "auto";
                pc.style.width = "auto";
              }
              const bp = doc.getElementById("preview-paper");
              if (bp) {
                bp.style.boxShadow = "none";
                if (isSingle) {
                  bp.style.overflow = "hidden";
                } else {
                  bp.style.minHeight = "auto";
                  bp.style.overflow = "visible";
                  bp.style.paddingTop = "0";
                  bp.style.paddingBottom = "0";
                }
              }
              return doc;
            },
          },
          jsPDF: {
            unit: "px",
            format: isSingle ? [A4W, Math.max(ch, A4H)] : "a4",
            orientation: "portrait",
            hotfixes: ["px_scaling"],
          },
          pagebreak: { mode: ['css','legacy'] },
        };
        if (isSingle) {
          opt.html2canvas.height = ch;
          opt.html2canvas.windowHeight = ch;
          opt.pagebreak = { mode: [] };
        }
        await html2pdf().set(opt).from(paper).save();
        notify("success", t("notify_saved").replace("{file}", fn));
      } catch (e) {
        console.error(e);
        notify("error", t("notify_saveFailed"));
      } finally {
        btn.disabled = false;
        const cs = btn.querySelector("svg");
        if (cs) {
          const ri = document.createElement("i");
          ri.setAttribute("data-lucide", "download");
          ri.style.cssText =
            "width:18px;height:18px;position:relative;z-index:1";
          cs.replaceWith(ri);
          lucide.createIcons();
        }
      }
    }

    let dragCounter = 0;
    document.addEventListener("dragenter", (e) => {
      e.preventDefault();
      dragCounter++;
      if (e.dataTransfer?.types?.includes("Files"))
        document.getElementById("drop-overlay").classList.add("active");
    });
    document.addEventListener("dragleave", (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        document.getElementById("drop-overlay").classList.remove("active");
      }
    });
    document.addEventListener("dragover", (e) => e.preventDefault());
    document.addEventListener("drop", (e) => {
      e.preventDefault();
      dragCounter = 0;
      document.getElementById("drop-overlay").classList.remove("active");
      if (!e.dataTransfer?.types?.includes("Files")) return;
      const files = e.dataTransfer.files;
      if (!files || !files.length) return;
      const file = files[0];
      if (file.type !== "application/json" && !file.name.endsWith(".json")) {
        notify("error", t("notify_invalidFile"));
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          showImportModal(JSON.parse(ev.target.result), file.name);
        } catch (err) {
          notify("error", "Invalid JSON file");
        }
      };
      reader.readAsText(file);
    });
    document.getElementById("theme-btn").addEventListener("click", () => {
      settings.theme = settings.theme === "dark" ? "light" : "dark";
      applyTheme();
      saveSettings();
    });
    document.getElementById("lang-btn").addEventListener("click", () => {
      settings.locale = settings.locale === "zh-CN" ? "en-US" : "zh-CN";
      applyLocale();
      saveSettings();
      renderEditor();
      renderSettings();
      renderPreview();
    });

    function setupLoadingOverlay() {
      const loc = detectSystemLocale();
      const ol = document.getElementById("loading-overlay");
      document.getElementById("loading-subtitle").textContent =
        I18N[loc]?.loadSub || I18N["en-US"].loadSub;
      document.getElementById("loading-dismiss").textContent =
        I18N[loc]?.loadDismiss || I18N["en-US"].loadDismiss;
      const feats = [
        { icon: "square-pen", key: "loadF1" },
        { icon: "palette", key: "loadF2" },
        { icon: "globe", key: "loadF3" },
        { icon: "download", key: "loadF4" },
        { icon: "file-input", key: "loadF5" },
      ];
      const fc = document.getElementById("loading-features");
      feats.forEach((f, i) => {
        const d = document.createElement("div");
        d.className = "load-slide";
        d.style.animationDelay = 0.35 + i * 0.08 + "s";
        d.style.cssText +=
          "display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.8125rem";
        d.innerHTML = `<div style="width:28px;height:28px;border-radius:8px;background:hsl(var(--accent));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i data-lucide="${f.icon}" style="width:14px;height:14px;color:var(--accent-color)"></i></div><span style="color:hsl(var(--muted-fg))">${I18N[loc]?.[f.key] || I18N["en-US"][f.key]}</span>`;
        fc.appendChild(d);
      });
      lucide.createIcons();
      const dismiss = () => {
        ol.classList.add("dismissed");
        setTimeout(() => ol.remove(), 500);
      };
      ol.addEventListener(
        "wheel",
        (e) => {
          if (e.deltaY > 0) dismiss();
        },
        { passive: true },
      );
      let tsy = 0;
      ol.addEventListener(
        "touchstart",
        (e) => {
          tsy = e.touches[0].clientY;
        },
        { passive: true },
      );
      ol.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches[0].clientY - tsy < -50) dismiss();
        },
        { passive: true },
      );
      ol.addEventListener("click", dismiss);
    }

    window.addEventListener("resize", updatePreviewScale);
    function init() {
      setupLoadingOverlay();
      /*initTemplates(2000);*/
      loadSettings();
      loadUI();
      loadData();
      if (!localStorage.getItem(STORAGE_KEYS.settings)) {
        settings.theme = detectSystemTheme();
        settings.locale = detectSystemLocale();
      }
      applyTheme();
      applyLocale();
      if (uiState.editorOpen)
        document.getElementById("editor-panel").classList.add("open");
      if (uiState.settingsOpen)
        document.getElementById("settings-panel").classList.add("open");
      attachEditorEventsOnce();
      renderEditor();
      renderSettings();
      renderPreview();
      setTimeout(updatePreviewScale, 100);
    }
    init();
  </script>
</body>

</html>
