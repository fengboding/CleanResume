<html lang="en">
<head>

<title>ResumeTool</title>
<script src="public/js/tailwind.js"></script>
<script src="public/js/lucide.js"></script>
<script src="public/js/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f8fafc;--bg2:#ffffff;--fg:#1e293b;--fg2:#64748b;--muted:#94a3b8;--border:#e2e8f0;--theme:#2563eb;--theme-fg:#ffffff;--shadow:rgba(0,0,0,.08);--modal-bg:rgba(15,23,42,.45);--toast-bg:#ffffff;--hover-bg:rgba(37,99,235,.08);--preview-title:#1b2a4a;--preview-field:#999;--card-bg:#fff;--input-bg:#f1f5f9;--resize-bg:#e2e8f0;--scrollbar:#cbd5e1;--scrollbar-hover:#94a3b8}
[data-theme="dark"]{--bg:#0f172a;--bg2:#1e293b;--fg:#e2e8f0;--fg2:#94a3b8;--muted:#64748b;--border:#334155;--theme:#f97316;--theme-fg:#ffffff;--shadow:rgba(0,0,0,.3);--modal-bg:rgba(0,0,0,.55);--toast-bg:#1e293b;--hover-bg:rgba(249,115,22,.12);--preview-title:#F1F5F9;--preview-field:#999;--card-bg:#1e293b;--input-bg:#334155;--resize-bg:#334155;--scrollbar:#475569;--scrollbar-hover:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans SC',-apple-system, BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--fg);transition:background .3s,color .3s;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}
.page-header{position:fixed;top:0;left:0;right:0;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;transition:background .3s,border-color .3s}
.page-footer{position:fixed;bottom:0;left:0;right:0;height:36px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:12px;font-size:12px;color:var(--fg2);z-index:100;transition:background .3s,border-color .3s}
.page-body{position:fixed;top:48px;left:0;right:0;bottom:36px;display:flex;transition:background .3s}
.panel{display:flex;flex-direction:column;overflow:hidden;transition:flex .05s;position:relative}
.panel-header{height:44px;min-height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;transition:background .3s,border-color .3s}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 15px;-webkit-overflow-scrolling:touch}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--fg);transition:background .2s,color .2s,border-color .2s,transform .1s;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--theme);border-color:var(--theme);color:var(--theme-fg)}
.btn:hover svg{stroke:var(--theme-fg)}
.btn-icon{border:none;padding:8px;background:transparent;color:var(--fg);cursor:pointer;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
.btn-icon:hover{background:var(--theme);color:var(--theme-fg)}
.btn-icon:hover svg{stroke:var(--theme-fg)}
.btn-icon.active{background:var(--theme);color:var(--theme-fg)}
.btn-icon.active svg{stroke:var(--theme-fg)}
.resize-handle{width:6px;cursor:col-resize;background:var(--resize-bg);flex-shrink:0;transition:background .3s;position:relative;z-index:10}
.resize-handle:hover,.resize-handle.active{background:var(--theme)}
.editor-section{margin:10px 0;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);transition:box-shadow .25s,border-color .3s,background .3s}
.editor-section:hover{box-shadow:0 2px 12px var(--shadow)}
.editor-section.dragging{opacity:.5;border-color:var(--theme)}
.editor-section.drag-over{border-color:var(--theme);box-shadow:0 0 0 2px rgba(37,99,235,.2)}
[data-theme="dark"] .editor-section.drag-over{box-shadow:0 0 0 2px rgba(249,115,22,.2)}
.section-header{display:flex;align-items:center;padding:8px 12px;cursor:pointer;gap:8px;border-radius:8px 8px 0 0;transition:background .15s;user-select:none}
.section-header:hover{background:var(--hover-bg)}
.section-body{padding:0 12px;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.section-body.collapsed{max-height:0!important;padding-top:0;padding-bottom:0}
.section-footer{padding:8px 12px}
.entry-header{display:flex;align-items:center;padding:6px 0;gap:6px;font-size:12px;color:var(--fg2)}
.entry-body{padding:0 0 10px 0}
.field-group{margin-bottom:8px}
.field-label{display:block;font-size:12px;color:var(--fg2);margin-bottom:3px;font-weight:500}
.field-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--input-bg);color:var(--fg);font-family:inherit;transition:border-color .2s,background .3s;outline:none}
.field-input:focus{border-color:var(--theme)}
.field-input::placeholder{color:var(--muted)}
textarea.field-input{resize:vertical;min-height:80px}
.duration-row{display:flex;gap:8px;align-items:center}
.duration-row .field-input{flex:1}
.duration-row span{color:var(--muted);font-size:13px;flex-shrink:0}
.count-badge{background:var(--theme);color:var(--theme-fg);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px}
.modal-overlay{position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px var(--shadow);max-width:520px;width:90%;max-height:80vh;display:flex;flex-direction:column;transform:translateY(12px) scale(.97);transition:transform .25s,background .3s,border-color .3s}
.modal-overlay.show .modal{transform:translateY(0) scale(1)}
.modal-header{display:flex;align-items:center;gap:8px;padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toast-container{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px var(--shadow);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);pointer-events:all;transform:translateY(-10px);opacity:0;transition:transform .3s,opacity .3s;white-space:nowrap}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.3)}
.toast-error{background:rgba(239,68,68,.15);color:#dc2626;border:1px solid rgba(239,68,68,.3)}
.toast-info{background:rgba(37,99,235,.12);color:#2563eb;border:1px solid rgba(37,99,235,.25)}
[data-theme="dark"] .toast-info{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.25)}
.toast-warning{background:rgba(234,179,8,.15);color:#ca8a04;border:1px solid rgba(234,179,8,.3)}
.btn-group-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;padding:2px 0;scrollbar-width:none;-ms-overflow-style:none}
.btn-group-scroll::-webkit-scrollbar{display:none}
.font-slider{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg2)}
.font-slider input[type=range]{width:100px;accent-color:var(--theme);height:4px}
.font-size-label{min-width:32px;text-align:center;font-variant-numeric:tabular-nums;opacity:0;transition:opacity .3s}
.font-size-label.show{opacity:1}
.preview-section{margin-bottom:20px}
.preview-section-title{display:flex;align-items:center;gap:8px;font-size:1.25em;font-weight:600;color:var(--preview-title);margin-bottom:0}
.preview-section-title svg{color:var(--theme);flex-shrink:0}
.preview-line{border:none;border-top:1.5px solid var(--preview-title);margin:8px 0 14px;opacity:.3}
.preview-contact{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center}
.preview-contact-item{display:flex;align-items:center;gap:4px;font-size:.8em;color:var(--preview-field)}
.preview-contact-item svg{color:var(--theme);flex-shrink:0}
.preview-desc{font-size:.8em;color:var(--preview-title);line-height:1.6}
.preview-desc ul{list-style-type:disc;padding-left:18px;margin:4px 0}
.preview-desc li{margin-bottom:2px}
.preview-desc p{margin-bottom:4px}
.preview-entry-wrap{margin-bottom:10px}
.float-btn{position:absolute;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s,border-color .2s;box-shadow:0 2px 8px var(--shadow);z-index:5}
.float-btn:hover{background:var(--theme);border-color:var(--theme);color:var(--theme-fg)}
.float-btn:hover svg{stroke:var(--theme-fg)}
.section-select-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:14px}
.section-select-item:hover{background:var(--hover-bg)}
.section-select-item.added{opacity:.45;pointer-events:none}
.import-table{width:100%;border-collapse:collapse;font-size:13px}
.import-table th,.import-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.import-table th{font-weight:600;color:var(--fg2);font-size:12px}
.import-scroll{max-height:300px;overflow-y:auto}
.status-success{color:#16a34a;display:flex;align-items:center;gap:4px}
.status-failed{color:#dc2626;display:flex;align-items:center;gap:4px}
.status-partial{color:#ca8a04;display:flex;align-items:center;gap:4px}
.status-unknown{color:#dc2626;display:flex;align-items:center;gap:4px}
.entry-dash{border-top:1px dashed var(--border);flex:1;margin:0 4px}
.dashed-add-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:6px;background:transparent;color:var(--fg2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:color .2s,border-color .2s;font-family:inherit;margin:8px 0}
.dashed-add-btn:hover{color:var(--theme);border-color:var(--theme)}
.dashed-add-btn:hover svg{stroke:var(--theme)}
.pb-active{background:var(--theme)!important;color:var(--theme-fg)!important}
.pb-active svg{stroke:var(--theme-fg)!important}
.github-link{color:var(--fg2);transition:color .2s;display:flex;align-items:center}
.github-link:hover{color:var(--theme)}
.preview-top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.preview-top-left{flex:1;min-width:0}
.preview-top-right{text-align:right;flex-shrink:0}
@media(max-width:768px){.btn .btn-label{display:none}.resize-handle{display:none}.font-slider input[type=range]{width:70px}}
@media print{.page-header,.page-footer,.resize-handle,.editor-panel,.float-btn{display:none!important}.preview-panel{width:100%!important}}
</style>

var resizeHandle=document.getElementById('resizeHandle');var isResizing=false;
resizeHandle.addEventListener('mousedown',function(e){isResizing=true;resizeHandle.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();});
document.addEventListener('mousemove',function(e){if(!isResizing)return;var b=document.getElementById('pageBody').getBoundingClientRect();state.settings.previewRatio=Math.round(Math.max(20,Math.min(80,((e.clientX-b.left)/b.width)*100)));updateLayout();});
document.addEventListener('mouseup',function(){if(isResizing){isResizing=false;resizeHandle.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';saveState();}});
resizeHandle.addEventListener('touchstart',function(e){isResizing=true;resizeHandle.classList.add('active');e.preventDefault();},{passive:false});
document.addEventListener('touchmove',function(e){if(!isResizing)return;var touch=e.touches[0];var b=document.getElementById('pageBody').getBoundingClientRect();state.settings.previewRatio=Math.round(Math.max(20,Math.min(80,((touch.clientX-b.left)/b.width)*100)));updateLayout();},{passive:false});
document.addEventListener('touchend',function(){if(isResizing){isResizing=false;resizeHandle.classList.remove('active');saveState();}});
document.getElementById('editorBody').addEventListener('input',function(e){var el=e.target;if(!el.dataset)return;if(el.dataset.section==='profile'){state.data.profile[el.dataset.f]=el.value;saveState();debouncePreview();return;}if(el.dataset.section==='summary'){state.data.summary[el.dataset.f]=el.value;saveState();debouncePreview();return;}if(el.dataset.s!==undefined&&el.dataset.f!==undefined){var si=parseInt(el.dataset.s),ei=parseInt(el.dataset.e),f=el.dataset.f;if(state.data.managedSections[si]&&state.data.managedSections[si].entries[ei]!==undefined){state.data.managedSections[si].entries[ei][f]=el.value;saveState();debouncePreview();}}});
var previewDebounce=null;function debouncePreview(){clearTimeout(previewDebounce);previewDebounce=setTimeout(function(){renderPreview();},120);}
document.getElementById('addSectionBtn').onclick=showSectionSelect;
document.getElementById('pdfBtn').onclick=saveAsPdf;
['confirmModal','sectionSelectModal','importDetailsModal'].forEach(function(id){document.getElementById(id).addEventListener('click',function(e){if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});});
window.addEventListener('resize',function(){updateLayout();});
function init(){loadState();renderAll();}
init();
</script>
</body>
</html>
